services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_conversation
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: ai_conversation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
